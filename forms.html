<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="">
        
        <fieldset>
            <legend><b>Course Registration</b></legend>
        <table>
        <tr>
            <td><label for="">first name</label></td>
            <td><input type="text" name="name" placeholder="neha" /></td><br/>
        </tr>
        
        <tr>
            <td><label for="">surname</label></td>
            <td><input type="text" name="name" placeholder="kondamuri" /></td><br/>
        </tr>
        <tr>
            <td><label for="">phonenumber</label></td>
            <td><input type="tel" /><br/></td>
        </tr>
        <tr>
            <td><label for="">email</label></td>
            <td><input type="email" name="name" placeholder="neha@gmail" /> <br/></td>
        </tr>
        <tr>
            <td><label for="">password</label></td>
            <td><input type="password" /><br/></td>
        </tr>
        <tr>
            <td><label for="">confirmpassword</label></td>
            <td><input type="password" /><br/></td>
        </tr>
        <tr>
            <td><label for="">Date of Birth </label></td>
            <td><input type="date"/><br/></td>
        </tr>
        <tr>
            <td> <label for="">age</label></td>
            <td><input type="number"required max="60"/><br/></td>
        </tr>
        <tr>
            <td><label for="">gender</label></td>
             <td><input type="radio" name="gender" value="m"/><label for="">male</label>
            <input type="radio" name="gender" value="F"/><label for="">Female</label>
            <input type="radio" name="gender" value="others"/><label for="">others</label></td><br/>
        </tr>
        <tr>
           <td><label for="">select country</label></td>
            <td><select name="country">
            <option value="India">india</option>
            <option value="usa">usa</option></td>
            </select>  <br/>
        </tr>
        <tr>
            <td><label for="">upload picture</label></td>
            <td><input type="file"/><br/>
                <input type="reset"/><br/></td>
        </tr>
        </table>
        </fieldset>
        <fieldset>
            <table>
            <h1>course details</h1>
            <tr>
                <td><label for="">select course</label></td>
                <td><select name="course">
                    <option value="java full stack">java full stack</option>
                    <option value="python">python</option>
                    <option value="web development">web development</option></td>
                </select><br/>
            </tr>
             <tr>
                <td><label for="">delivery mode</label></td>
                <td><input type="radio" name="mode" value="online"/>online
                    <input type="radio" name="mode" value="offline"/>offline<br/></td>
             </tr>
             <tr>
                <td><label for="">Institute Name</label></td>
                <td><input type="text" name="institute" placeholder="Thopstech"/><br/></td>
             </tr>
             <tr>
            
                <td><label for="">comments</label><br/></td>
                <td><textarea id="comments" name="comments" cols="50" rows="10"></textarea></td><br/>
                
            </tr>
            <tr>
                <td><button type="submit">submit</button> </td>
            </tr>
          
               
        </fieldset>
        
    </table>
</form>
</body>
</html>
